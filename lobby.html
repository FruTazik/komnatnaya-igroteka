<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в комнату - Игротека</title>
    
    <!-- Стили -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <!-- Конфиг Firebase -->
    <script src="firebase-config.js"></script>
    
    <style>
        .debug-console {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-width: 400px;
            max-height: 200px;
            overflow: auto;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>
    <div class="debug-console" id="debugConsole"></div>
    
    <div class="container">
        <h1 class="title">🚪 Вход в игру</h1>
        
        <div class="lobby-options">
            <!-- Создание комнаты -->
            <div class="option-card">
                <h2>Создать новую комнату</h2>
                <input type="text" id="nickname-create" class="nick-input" placeholder="Введите ваш ник" maxlength="20">
                <button class="action-btn" onclick="createRoom()">Создать комнату</button>
            </div>
            
            <!-- Подключение к комнате -->
            <div class="option-card">
                <h2>Подключиться к комнате</h2>
                <input type="text" id="nickname-join" class="nick-input" placeholder="Введите ваш ник" maxlength="20">
                <input type="text" id="room-code" class="code-input" placeholder="#A7F3C1" maxlength="7" oninput="formatCode(this)">
                <button class="action-btn" onclick="joinRoom()">Подключиться</button>
            </div>
        </div>
        
        <!-- Инструкция -->
        <div class="footer">
            <h3>Как подключить друга?</h3>
            <p>🔹 Если создаёшь комнату — отправь другу код, который появится на следующем экране</p>
            <p>🔹 Если подключаешься — попроси код у друга и введи его выше</p>
            <p class="small">Код всегда начинается с # и состоит из 6 букв/цифр</p>
        </div>
    </div>
    
    <script src="lobby-script.js"></script>
    
    <script>
        // Отладка
        console.log('🏁 lobby.html загружен');
        console.log('Текущий localStorage:', {
            nickname: localStorage.getItem('playerNickname'),
            roomCode: localStorage.getItem('roomCode'),
            roomId: localStorage.getItem('roomId'),
            isAdmin: localStorage.getItem('isAdmin')
        });
        
        // Очистка localStorage при загрузке (для теста)
        // localStorage.clear();
    </script>
</body>
</html>
